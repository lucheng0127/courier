version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: courier-postgres
    environment:
      POSTGRES_DB: courier
      POSTGRES_USER: courier
      POSTGRES_PASSWORD: courier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courier"]
      interval: 5s
      timeout: 5s
      retries: 5

  courier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: courier-api
    environment:
      # 数据库配置
      DATABASE_URL: host=postgres port=5432 user=courier password=courier dbname=courier sslmode=disable
      # 服务端口
      PORT: 8080
      # JWT 配置
      JWT_SECRET: your-jwt-secret-key-change-in-production
      JWT_ISSUER: courier-gateway
      JWT_ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_TOKEN_EXPIRES_IN: 168h
      # 初始管理员配置（可选）
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: admin123456
      # 日志和迁移配置
      LOG_LEVEL: info
      ENV: development
      AUTO_MIGRATE: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Web 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courier-frontend
    ports:
      - "80:80"
    depends_on:
      - courier

volumes:
  postgres_data:
